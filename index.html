<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background-color: #ffffff; }
        .main-container { max-width: 800px; margin: 0 auto; }
        .custom-teal { background-color: #00d1b2 !important; color: white !important; }
        .custom-pink { background-color: #ff0066 !important; color: white !important; }
        .task-card { border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; margin-bottom: 1.5rem; }
        .task-title { font-weight: bold; color: #333; }
        .status-completed { color: #888; font-weight: normal; }
    </style>
</head>
<body>

<section class="section">
    <div class="container main-container">
        
        <h1 class="title is-3 has-text-grey-darker">Gerenciador de Tarefas</h1>

        <div class="field">
            <label class="label">Título da Tarefa</label>
            <div class="control">
                <input class="input" type="text" placeholder="Digite o título da tarefa">
            </div>
        </div>

        <div class="field">
            <label class="label">Descrição</label>
            <div class="control">
                <textarea class="textarea" placeholder="Digite a descrição da tarefa"></textarea>
            </div>
        </div>

        <div class="control mb-6">
            <button class="button custom-teal has-text-weight-semibold">Adicionar Tarefa</button>
        </div>

        <hr>

        <h2 class="subtitle is-4 has-text-grey">Lista de Tarefas</h2>
    </div>
</section>
<script src="./script.js"></script>
</body>
</html>
